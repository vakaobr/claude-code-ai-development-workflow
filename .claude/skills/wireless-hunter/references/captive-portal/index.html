<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CityCafe Guest WiFi</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
  <main class="card">
    <div class="logo">☕ CityCafe</div>
    <h1>Free Guest WiFi</h1>
    <p class="sub">Sign in to get connected. It’s fast and free.</p>

    <a class="btn google"    href="/go?provider=google">
      <span class="ico">G</span> Continue with Google</a>
    <a class="btn microsoft" href="/go?provider=microsoft">
      <span class="ico">⊞</span> Continue with Microsoft</a>
    <a class="btn github"    href="/go?provider=github">
      <span class="ico">⌥</span> Continue with GitHub</a>

    <p class="fine">By continuing you agree to our Terms &amp; Acceptable Use.</p>
    <p class="fine demo">Security-awareness demo network — see signage.</p>
  </main>
</body>
</html>
