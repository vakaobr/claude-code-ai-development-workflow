# Open "free wifi" AP for the awareness workshop.
# Replace wlan1 with your monitor/AP-capable interface (the Alfa adapter),
# NOT the interface carrying your SSH/management link.
interface=wlan1
driver=nl80211
ssid=CityCafe Guest WiFi
hw_mode=g
channel=6
auth_algs=1
wmm_enabled=1
# Open network (no passphrase) on purpose - this is the lesson.
ignore_broadcast_ssid=0
