# DHCP + DNS for the AP interface. All DNS answers point at the portal so
# any web request triggers the captive-portal splash.
interface=wlan1
bind-interfaces
dhcp-range=10.0.0.10,10.0.0.250,255.255.255.0,12h
dhcp-option=3,10.0.0.1        # gateway = the AP host
dhcp-option=6,10.0.0.1        # DNS = the AP host
# Resolve EVERYTHING to the portal (captive-portal behaviour).
address=/#/10.0.0.1
# NOTE: set the AP interface IP first:
#   sudo ip addr add 10.0.0.1/24 dev wlan1 && sudo ip link set wlan1 up
