#            .claude/security-scope.yaml
# =====================================================================
#  ⚠  TEMPLATE — REPLACE WITH REAL COMPANY ASSETS BEFORE RUNNING ANY
#     SECURITY SKILL OR THE security-orchestrator AGENT.
# =====================================================================
#
# Authorization declaration for defensive security testing.
# Every security skill reads this file before producing test traffic.
# If this file does not exist OR contains only placeholder assets,
# skills must halt and refuse to test.
#
# Placeholder values below (`app.internal.example.com`,
# `*.aws-account-12345.s3.amazonaws.com`, etc.) are illustrative
# examples showing the expected shape of each field. They are NOT
# testable targets. Replace them with real, explicitly-authorized
# company assets before the first live run.
#
# Maintenance:
#   - Update `authorized_by` to the actual approving team / individual.
#   - Set `authorization_date` to the date the scope was signed off.
#   - Set `review_date` to the next required review (quarterly default).
#   - Every `assets:` entry must reflect a real in-scope target.
# ---------------------------------------------------------------------

version: "1.0"
authorized_by: "REPLACE_ME - the team or individual authorizing the assessment"
authorization_date: "YYYY-MM-DD"
review_date: "YYYY-MM-DD"  # Scope file must be re-validated quarterly

# Environments in scope. Production requires explicit opt-in per asset.
environments:
  - name: staging
    default_testing: active
    rate_limit_rps: 20
  - name: development
    default_testing: active
    rate_limit_rps: 50
  - name: production
    default_testing: passive_only  # Override per-asset below
    rate_limit_rps: 5

# Assets explicitly in scope.
# Every asset must declare: name, environment, testing_level,
# and whether destructive or service-affecting tests are approved.
assets:

  - name: "app.internal.example.com"
    environment: staging
    asset_type: web_application
    tech_stack: [php, laravel, mysql]
    testing_level: active         # active | passive | none
    destructive_testing: denied   # denied | approved
    service_affecting: denied
    notes: "Primary customer-facing app. Test auth flows carefully."

  - name: "api.internal.example.com"
    environment: staging
    asset_type: rest_api
    tech_stack: [node, express, postgres]
    testing_level: active
    destructive_testing: denied
    service_affecting: approved   # Rate-limit tests approved
    owasp_api_top10_applicable: true

  - name: "admin.internal.example.com"
    environment: staging
    asset_type: web_application
    tech_stack: [python, django]
    testing_level: active
    destructive_testing: denied
    service_affecting: denied
    requires_auth_testing_credentials: true
    test_credentials_vault_path: "secret/pentest/admin-app"

  - name: "*.aws-account-12345.s3.amazonaws.com"
    asset_type: aws_s3
    testing_level: passive        # Enumeration only, no uploads
    destructive_testing: denied
    service_affecting: denied
    notes: "Check bucket ACLs and policies only."

  - name: "gitlab.internal.example.com"
    asset_type: gitlab_instance
    testing_level: passive
    destructive_testing: denied
    service_affecting: denied
    notes: "CI/CD config review only. No pipeline execution tests."

# Explicitly out of scope. Skills must refuse these even if tempted.
out_of_scope:
  - "*.thirdparty-saas.com"        # Vendor we integrate with
  - "auth.oauth-provider.com"      # External IdP
  - "cdn.cloudprovider.com"
  - "prod-db.internal.example.com" # Direct DB access not approved
  - "*.customer-owned.com"         # Customer-managed assets

# Technique-level restrictions that override per-asset settings.
technique_restrictions:
  never_run:
    - "credential_stuffing"        # We have other controls for this
    - "social_engineering"
    - "physical_access_tests"
    - "dos_flooding"               # Different from rate-limit testing
  require_approval:
    - "fuzzing_with_high_volume"   # >1000 requests
    - "session_fixation_across_users"
    - "authentication_brute_force" # Even with test accounts

# =====================================================================
#  RED-TEAM EXTENSION  (internal AD / mobile / LLM)
# ---------------------------------------------------------------------
#  Gates for the extension skills that the web/API/cloud
#  security-orchestrator does NOT auto-dispatch:
#    - internal-ad profile : ad-recon-hunter, ad-kerberos-hunter
#    - ai-redteam  profile : llm-redteam-hunter
#    - mobile-sast profile : mobile-android-hunter
#
#  These carry higher blast radius than the harmless-probe hunters, so
#  every flag DEFAULTS TO `denied`. A skill halts unless its master gate
#  is `approved` AND its target appears in the relevant list here AND the
#  target is not in `out_of_scope` above. Targets listed here must also
#  be covered by a signed rules-of-engagement.
# =====================================================================
red_team_extension:

  # --- Internal Active Directory (ad-recon-hunter, ad-kerberos-hunter) ---
  internal_pentest: denied            # denied | approved — master gate for internal-ad profile
  ad_credentials_vault_path: ""       # e.g. "secret/pentest/ad-engagement" — creds loaded ONLY from here
  ad_domains: []                      # e.g. ["corp.local"] — in-scope AD domains
  ad_subnets: []                      # e.g. ["10.0.0.0/24"] — in-scope internal ranges
  scan_hours: "any"                   # ROE scan window, e.g. "Mon-Fri 18:00-06:00 UTC"
  # Sub-gates (each must be independently approved; all default denied):
  offline_cracking: denied            # hashcat/john on recovered AS-REP/TGS hashes
  impersonation_proof: denied         # mint/use S4U / RBCD / shadow-credential tickets (revert after proof)
  credential_dumping: denied          # secretsdump / LSASS / NTDS — requires already-proven admin reach
  domain_dominance: denied            # golden/silver/diamond tickets, DCSync as DA, forged certs

  # --- LLM red-team (llm-redteam-hunter) ---
  llm_redteam: denied                 # denied | approved — master gate for ai-redteam profile
  llm_endpoints: []                   # FIRST-PARTY endpoints only, e.g. ["https://app.internal.example.com/api/chat"]
  llm_redteam_max_requests: 2000      # cost ceiling for garak/PyRIT probe batteries

  # --- Mobile static assessment (mobile-android-hunter) ---
  mobile_testing: denied              # denied | approved — master gate for mobile-sast profile
  mobile_artifacts: []                # e.g. ["builds/app-release.apk (sha256:abc…)"]
  mobsf_instance: "local"             # MUST be a local/self-hosted MobSF — never the public hosted instance

# =====================================================================
#  DFIR / INCIDENT RESPONSE
# ---------------------------------------------------------------------
#  Gates for the digital-forensics / incident-response extension
#  (dfir-readonly profile): memory-forensics-hunter, disk-triage-hunter,
#  log-timeline-hunter, grounded by the incident-response reference skill.
#
#  These analyze ACQUIRED EVIDENCE COPIES read-only. The prime directive
#  is evidence integrity: skills hash-verify each item before analysis and
#  HALT on mismatch. They never acquire, mount read-write, contain, or
#  eradicate. Gates default to `denied`.
# =====================================================================
dfir_scope:
  incident_response: denied           # denied | approved — master gate for dfir-readonly profile
  case_id: ""                         # e.g. "IR-2026-0042" — the active incident case
  evidence_store_path: ""             # secure path to verified evidence COPIES, e.g. "/cases/IR-2026-0042/evidence"
  chain_of_custody_log: ""            # append-only custody log path, e.g. "/cases/IR-2026-0042/coc.md"
  allow_live_response: denied         # denied | approved — analysis on a LIVE production host (default: offline images only)
  external_sandbox: denied            # denied | approved — upload extracted samples to a third-party sandbox (evidence may be regulated)
